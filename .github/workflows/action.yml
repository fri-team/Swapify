name: Actions with docker
on:
  push:

jobs:  
  action_build:
    name: actions_build
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Checkout github actions
      uses: actions/checkout@v2
      env:
        ASPNETCORE_ENVIRONMENT: Development
    
    - name: buildx
      uses: docker/setup-buildx-action@v1
      id: buildx
      with:
        install: true
    
    - name: Build
      run: docker build .
