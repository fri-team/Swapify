name: Actions with docker
on:
  push:

jobs:  
  action_build:
    name: actions_build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2
        env:
          ASPNETCORE_ENVIRONMENT: Production
      - name: '1. Checkout github actions'
        uses: actions/setup-node@v2
        with:
          node-version: '12'
      - name: Build
        run: docker build .
