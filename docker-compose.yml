  swapify:
    build:
      context: .
      dockerfile: Dockerfile
    image: swapify-app
    container_name: swapify
    volumes:
      # - /home/ubuntu/Swapify/:
      - ./logs:/app/logs
      # - .docker_compose_volume/nginx:/var/log/nginx
      # - ./var/log/nginx:/var/log/nginx
      # Volumes we need for TLS
      # - ./etc/ssl:/etc/ssl # dhparams file
      - ./etc/letsencrypt
      - ./etc/letsencrypt/live:/root/.dotnet/https # current certificate
      - ./etc/letsencrypt/archive:/root/.dotnet/https # all certificates (symlinks from /live points here) 
      # - ./etc/letsencrypt/options-ssl-nginx.conf:/etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
      # - ./etc/letsencrypt/ssl-dhparams.pem:/etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      # - 0.0.0.0:3000:3000
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BaseUrl=https://18.193.17.141
      - JwtSecret=CchangOrDNChanngSecr
      - NODE_ENV=production
    # links:
    #   - db
    depends_on:
      - mongodb
      # - nginx
    links:
      - mongodb
  mongodb:
    image: mongo
    container_name: mongodb
    volumes:
      - ./data:/data/db
    # expose:
    #   - 80
      # - BaseUrl=http://18.184.180.36:80/
